services:
  mysql:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: studentdb
    ports:
      - "3306:3306"

  app:
    image: student-management
    container_name: student-app
    ports:
      - "8081:8089"
    depends_on:
      - mysql