apiVersion: v1
kind: Service
metadata:
  name: student-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /student/actuator/prometheus
    prometheus.io/port: "8089"
spec:
  type: NodePort
  selector:
    app: student-app
  ports:
    - port: 8089
      targetPort: 8089
      nodePort: 30007
