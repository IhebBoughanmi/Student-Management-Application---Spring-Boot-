apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
    spec:
      containers:
        - name: app
          image: student-management:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8089
          startupProbe:
            httpGet:
              path: /student/actuator/health
              port: 8089
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /student/actuator/health/readiness
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /student/actuator/health/liveness
              port: 8089
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
